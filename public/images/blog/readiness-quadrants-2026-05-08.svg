<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-labelledby="title desc">
  <title id="title">The four readiness quadrants</title>
  <desc id="desc">A 2x2 matrix plotting Build Readiness against Investor Readiness, with four quadrants: Forged, Tempering, Hot Iron, and Ore.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      :root {
        --steel-900: #0f172a;
        --steel-800: #1e293b;
        --steel-700: #334155;
        --steel-400: #94a3b8;
        --steel-300: #cbd5e1;
        --steel-100: #f1f5f9;
        --fire-400: #f97316;
        --brass-300: #fbbf24;
        --brass-500: #b45309;
      }
      .display { font-family: 'Syne', 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .body { font-family: 'DM Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .italic-x { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; font-style: italic; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="var(--steel-900)"/>

  <!-- Title -->
  <text x="800" y="86" text-anchor="middle" class="display" font-weight="800" font-size="44" fill="var(--steel-100)" letter-spacing="-0.5">The four readiness quadrants</text>
  <text x="800" y="124" text-anchor="middle" class="body" font-weight="400" font-size="20" fill="var(--steel-400)">Build Readiness vs. Investor Readiness</text>

  <!-- Y-axis label -->
  <text class="body" font-weight="500" font-size="14" fill="var(--fire-400)" letter-spacing="3" transform="translate(78 540) rotate(-90)" text-anchor="middle">BUILD READINESS →</text>
  <!-- X-axis label -->
  <text x="800" y="950" text-anchor="middle" class="body" font-weight="500" font-size="14" fill="var(--fire-400)" letter-spacing="3">INVESTOR READINESS →</text>

  <!-- ============ TOP-LEFT: Tempering ============ -->
  <g>
    <rect x="120" y="180" width="660" height="340" rx="12" fill="var(--steel-800)" stroke="var(--steel-700)" stroke-width="1"/>
    <rect x="120" y="180" width="6" height="340" rx="3" fill="var(--brass-300)"/>
    <text x="160" y="232" class="body" font-weight="600" font-size="13" letter-spacing="3" fill="var(--fire-400)">TEMPERING</text>
    <text x="160" y="280" class="display" font-weight="700" font-size="26" fill="var(--steel-100)">Build ready, not investor ready</text>
    <text x="160" y="328" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">Durable companies telling their story poorly,</text>
    <text x="160" y="354" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">structured for the wrong round, or aimed at</text>
    <text x="160" y="380" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">the wrong stage of capital.</text>
    <line x1="160" y1="420" x2="220" y2="420" stroke="var(--brass-300)" stroke-width="2"/>
    <text x="160" y="454" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">A focused sprint on narrative and stage fit</text>
    <text x="160" y="478" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">can move you to Forged — without changing</text>
    <text x="160" y="502" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">the underlying business.</text>
  </g>

  <!-- ============ TOP-RIGHT: Forged ============ -->
  <g>
    <rect x="820" y="180" width="660" height="340" rx="12" fill="var(--steel-800)" stroke="var(--steel-700)" stroke-width="1"/>
    <rect x="820" y="180" width="6" height="340" rx="3" fill="var(--fire-400)"/>
    <text x="860" y="232" class="body" font-weight="600" font-size="13" letter-spacing="3" fill="var(--fire-400)">FORGED</text>
    <text x="860" y="280" class="display" font-weight="700" font-size="26" fill="var(--steel-100)">Build ready + investor ready</text>
    <text x="860" y="328" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">The obvious "fund it" companies. Operate</text>
    <text x="860" y="354" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">well, present well, structured well.</text>
    <line x1="860" y1="420" x2="920" y2="420" stroke="var(--fire-400)" stroke-width="2"/>
    <text x="860" y="454" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">Rarer than the market behaves as if they are.</text>
  </g>

  <!-- ============ BOTTOM-LEFT: Ore ============ -->
  <g>
    <rect x="120" y="560" width="660" height="340" rx="12" fill="var(--steel-800)" stroke="var(--steel-700)" stroke-width="1"/>
    <rect x="120" y="560" width="6" height="340" rx="3" fill="var(--steel-400)"/>
    <text x="160" y="612" class="body" font-weight="600" font-size="13" letter-spacing="3" fill="var(--fire-400)">ORE</text>
    <text x="160" y="660" class="display" font-weight="700" font-size="26" fill="var(--steel-100)">Neither yet</text>
    <text x="160" y="708" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">Too early to fund, too unfinished to operate.</text>
    <text x="160" y="734" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">The honest answer is more time, more evidence.</text>
    <line x1="160" y1="780" x2="220" y2="780" stroke="var(--steel-400)" stroke-width="2"/>
    <text x="160" y="814" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">Build, don't pitch. The market will be there</text>
    <text x="160" y="838" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">when you are.</text>
  </g>

  <!-- ============ BOTTOM-RIGHT: Hot Iron ============ -->
  <g>
    <rect x="820" y="560" width="660" height="340" rx="12" fill="var(--steel-800)" stroke="var(--steel-700)" stroke-width="1"/>
    <rect x="820" y="560" width="6" height="340" rx="3" fill="var(--brass-500)"/>
    <text x="860" y="612" class="body" font-weight="600" font-size="13" letter-spacing="3" fill="var(--fire-400)">HOT IRON</text>
    <text x="860" y="660" class="display" font-weight="700" font-size="26" fill="var(--steel-100)">Investor ready, not build ready</text>
    <text x="860" y="708" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">Polished pitch, clean deck, weak fundamentals.</text>
    <text x="860" y="734" class="body" font-weight="400" font-size="17" fill="var(--steel-300)">The companies that raise — and quietly stall.</text>
    <line x1="860" y1="780" x2="920" y2="780" stroke="var(--brass-500)" stroke-width="2"/>
    <text x="860" y="814" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">Capital deployed into companies that can't absorb it</text>
    <text x="860" y="838" class="body" font-weight="500" font-size="15" fill="var(--steel-400)">productively. The cost shows up 18 months later.</text>
  </g>

  <!-- FNDRYx logo bottom-left -->
  <g transform="translate(120 968)">
    <text x="0" y="0" class="display" font-weight="800" font-size="22" fill="var(--steel-400)">FNDRY<tspan class="italic-x" font-weight="400" fill="var(--fire-400)">x</tspan></text>
  </g>

</svg>
